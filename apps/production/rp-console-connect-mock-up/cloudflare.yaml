apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-rp-console 
spec:
  selector:
    matchLabels:
      app: cloudflared-rp-console 
  replicas: 2
  template:
    metadata:
      labels:
        app: cloudflared-rp-console
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2025.2.0
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds
          readOnly: true
      volumes:
      - name: creds
        secret:
          secretName: tunnel-credentials
      - name: config
        configMap:
          name: cloudflared-rp-console 
          items:
          - key: config.yaml
            path: config.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-rp-console 
data:
  config.yaml: |
    tunnel: ldpi 
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: connect.neon.toys
        service: http://connect.neon.svc.cluster.local:5656
      - service: http_status:404
