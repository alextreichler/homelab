apiVersion: apps/v1
kind: Deployment
metadata:
  name: rp-support-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rp-support-chat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: rp-support-chat
    spec:
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: rp-support-chat
          image: ghcr.io/alextreichler/rp-support-chat:0.2.2
          imagePullPolicy: Always
          ports:
            - containerPort: 7432
          env:
            - name: RP_SECURE_COOKIES
              value: "1"
            - name: RP_DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 7432
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 7432
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rp-support-chat-data
